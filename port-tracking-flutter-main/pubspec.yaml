name: port_tracking_flutter
description: Port Tracking - Flutter Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP Client
  dio: ^5.4.0

  # State Management
  provider: ^6.1.1

  # Secure Token Storage
  flutter_secure_storage: ^9.0.0

  # JWT Decode (extract user role from token)
  jwt_decoder: ^2.0.1

  # Navigation
  go_router: ^13.0.0

  # UI
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1

  # File & Image picker (for document upload)
  image_picker: ^1.0.7

  # QR Code display
  qr_flutter: ^4.1.0

  # QR Code Scanner ✅
  mobile_scanner: ^5.0.0

  # Date formatting
  intl: ^0.19.0

  # Loading indicators
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/